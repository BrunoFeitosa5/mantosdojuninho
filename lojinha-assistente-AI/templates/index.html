<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juninho — Assistente Mantos do Juninho</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── Header ── */
    .chat-wrapper {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      height: 92vh;
      max-height: 820px;
    }

    .chat-header {
      background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
      border: 1px solid #D4A01744;
      border-bottom: 2px solid #D4A017;
      border-radius: 16px 16px 0 0;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 30%;
      background: linear-gradient(135deg, #FFD700, #D4A017);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 14px #FFD70066;
      position: relative;
      overflow: visible;
    }

    .avatar::before {
      content: '';
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 12px;
      background: #D4A017;
      border-radius: 2px;
    }

    .avatar::after {
      content: '';
      position: absolute;
      top: -21px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      background: #FFE566;
      border-radius: 50%;
      border: 2px solid #D4A017;
      box-shadow: 0 0 6px #FFD70088;
    }

    .header-info h1 {
      font-size: 17px;
      font-weight: 700;
      color: #D4A017;
      letter-spacing: 0.3px;
    }

    .header-info p {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-reset {
      margin-left: auto;
      background: none;
      border: 1px solid #333;
      color: #666;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-reset:hover { border-color: #D4A017; color: #D4A017; }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      background: #111;
      border-left: 1px solid #D4A01722;
      border-right: 1px solid #D4A01722;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: #111; }
    .chat-messages::-webkit-scrollbar-thumb { background: #D4A01744; border-radius: 4px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg.bot .msg-avatar {
      background: linear-gradient(135deg, #FFD700, #D4A017);
      border-radius: 30%;
      position: relative;
      overflow: visible;
      box-shadow: 0 0 8px #FFD70055;
    }

    .msg.bot .msg-avatar::before {
      content: '';
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 8px;
      background: #D4A017;
      border-radius: 2px;
    }

    .msg.bot .msg-avatar::after {
      content: '';
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      background: #FFE566;
      border-radius: 50%;
      border: 1.5px solid #D4A017;
    }

    .msg.user .msg-avatar { background: #2a2a2a; border: 1px solid #333; }

    .msg-bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.bot .msg-bubble {
      background: #1c1c1c;
      border: 1px solid #D4A01733;
      color: #e8e8e8;
      border-bottom-left-radius: 4px;
    }

    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #D4A017, #c49010);
      color: #000;
      font-weight: 500;
      border-bottom-right-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .typing-avatar {
      width: 34px;
      height: 34px;
      border-radius: 30%;
      background: linear-gradient(135deg, #FFD700, #D4A017);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
      box-shadow: 0 0 8px #FFD70055;
    }

    .typing-avatar::before {
      content: '';
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 8px;
      background: #D4A017;
      border-radius: 2px;
    }

    .typing-avatar::after {
      content: '';
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      background: #FFE566;
      border-radius: 50%;
      border: 1.5px solid #D4A017;
    }

    .typing-bubble {
      background: #1c1c1c;
      border: 1px solid #D4A01733;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #D4A017;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ── */
    .chat-input-area {
      background: #1a1a1a;
      border: 1px solid #D4A01744;
      border-top: 2px solid #D4A01733;
      border-radius: 0 0 16px 16px;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input-msg {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      color: #e8e8e8;
      font-size: 14.5px;
      padding: 11px 16px;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 44px;
      overflow-y: auto;
      line-height: 1.45;
      font-family: inherit;
      transition: border-color .2s;
    }
    #input-msg:focus { border-color: #D4A017; }
    #input-msg::placeholder { color: #555; }

    #btn-send {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #D4A017, #b8860b);
      color: #000;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
    }
    #btn-send:hover  { transform: scale(1.06); }
    #btn-send:active { transform: scale(.96); }
    #btn-send:disabled { opacity: .4; cursor: default; transform: none; }

    /* ── Sugestões rápidas ── */
    .quick-btns {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      padding: 0 16px 12px;
      background: #1a1a1a;
      border-left: 1px solid #D4A01744;
      border-right: 1px solid #D4A01744;
    }

    .quick-btn {
      background: #222;
      border: 1px solid #D4A01744;
      border-radius: 20px;
      color: #D4A017;
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .quick-btn:hover { background: #D4A01722; border-color: #D4A017; }

    /* ── Boas-vindas ── */
    .welcome {
      text-align: center;
      padding: 20px 10px;
      color: #555;
    }
    .welcome .icon { font-size: 40px; margin-bottom: 8px; }
    .welcome p { font-size: 13px; line-height: 1.5; }
    .welcome strong { color: #D4A017; }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 26" width="30" height="24"><circle cx="9" cy="10" r="5.5" fill="#1a1a1a"/><circle cx="23" cy="10" r="5.5" fill="#1a1a1a"/><circle cx="11" cy="8" r="2" fill="white"/><circle cx="25" cy="8" r="2" fill="white"/><path d="M6 19 Q16 24 26 19" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/><ellipse cx="2.5" cy="16" rx="3" ry="2" fill="#ff9999" opacity="0.55"/><ellipse cx="29.5" cy="16" rx="3" ry="2" fill="#ff9999" opacity="0.55"/></svg></div>
    <div class="header-info">
      <h1>Juninho</h1>
      <p><span class="status-dot"></span>Assistente Mantos do Juninho</p>
    </div>
    <button class="btn-reset" onclick="resetarChat()">🔄 Nova conversa</button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chat-messages">
    <div class="welcome">
      <div class="icon">👋</div>
      <p>Olá! Sou o <strong>Juninho</strong>, assistente da <strong>Mantos do Juninho</strong>.<br/>
         Pergunte sobre camisas, preços, tamanhos ou promoções!</p>
    </div>
  </div>

  <!-- Quick replies -->
  <div class="quick-btns" id="quick-btns">
    <button class="quick-btn" onclick="enviarRapido('Quais camisas vocês têm?')">Ver produtos</button>
    <button class="quick-btn" onclick="enviarRapido('Qual a camisa mais barata?')">Menor preço</button>
    <button class="quick-btn" onclick="enviarRapido('Tem camisa do Brasil?')">Seleção Brasileira</button>
    <button class="quick-btn" onclick="enviarRapido('Quais times internacionais têm?')">Times internacionais</button>
    <button class="quick-btn" onclick="enviarRapido('Como funciona o frete?')">Frete</button>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <textarea
      id="input-msg"
      placeholder="Digite sua mensagem…"
      rows="1"
      onkeydown="teclaEnter(event)"
      oninput="ajustarAltura(this)"
    ></textarea>
    <button id="btn-send" onclick="enviarMensagem()" title="Enviar">➤</button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('chat-messages');
  const inputEl    = document.getElementById('input-msg');
  const sendBtn    = document.getElementById('btn-send');
  const quickBtns  = document.getElementById('quick-btns');
  let aguardando   = false;

  const robotFaceSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="17"><circle cx="7" cy="8" r="4" fill="#1a1a1a"/><circle cx="17" cy="8" r="4" fill="#1a1a1a"/><circle cx="8.5" cy="6.5" r="1.5" fill="white"/><circle cx="18.5" cy="6.5" r="1.5" fill="white"/><path d="M5 14.5 Q12 18.5 19 14.5" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/><ellipse cx="2.5" cy="12" rx="2.5" ry="2" fill="#ff9999" opacity="0.55"/><ellipse cx="21.5" cy="12" rx="2.5" ry="2" fill="#ff9999" opacity="0.55"/></svg>`;

  function scrollFundo() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function ajustarAltura(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function teclaEnter(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviarMensagem();
    }
  }

  function adicionarMsg(texto, tipo) {
    const div = document.createElement('div');
    div.className = `msg ${tipo}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    if (tipo === 'bot') avatar.innerHTML = robotFaceSVG;
    else avatar.textContent = '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = texto;

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollFundo();
  }

  function mostrarTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="typing-avatar">${robotFaceSVG}</div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    messagesEl.appendChild(div);
    scrollFundo();
  }

  function removerTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function esconderQuickBtns() {
    quickBtns.style.display = 'none';
  }

  async function enviarMensagem() {
    if (aguardando) return;
    const texto = inputEl.value.trim();
    if (!texto) return;

    esconderQuickBtns();
    adicionarMsg(texto, 'user');
    inputEl.value = '';
    inputEl.style.height = 'auto';

    aguardando = true;
    sendBtn.disabled = true;
    mostrarTyping();

    try {
      const res = await fetch('/assistente/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensagem: texto }),
      });
      const data = await res.json();
      removerTyping();

      if (data.resposta) {
        adicionarMsg(data.resposta, 'bot');
      } else {
        adicionarMsg('Ops, algo deu errado. Tente novamente!', 'bot');
      }
    } catch {
      removerTyping();
      adicionarMsg('Não consegui me conectar. Verifique sua conexão.', 'bot');
    }

    aguardando = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function enviarRapido(texto) {
    inputEl.value = texto;
    enviarMensagem();
  }

  async function resetarChat() {
    await fetch('/assistente/reset', { method: 'POST' });
    messagesEl.innerHTML = `
      <div class="welcome">
        <div class="icon">👋</div>
        <p>Olá! Sou o <strong>Juninho</strong>, assistente da <strong>Mantos do Juninho</strong>.<br/>
           Pergunte sobre camisas, preços, tamanhos ou promoções!</p>
      </div>`;
    quickBtns.style.display = 'flex';
    inputEl.focus();
  }

  inputEl.focus();
</script>

</body>
</html>
