<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Camisa Brasil - Amarela com gola verde -->
  <!-- Corpo da camisa -->
  <path d="M40,60 L20,90 L15,180 L185,180 L180,90 L160,60 Z" fill="#FFCC00" stroke="#009B3A" stroke-width="2"/>
  <!-- Manga esquerda -->
  <path d="M40,60 L10,55 L5,100 L20,90 Z" fill="#FFCC00" stroke="#009B3A" stroke-width="2"/>
  <!-- Manga direita -->
  <path d="M160,60 L190,55 L195,100 L180,90 Z" fill="#FFCC00" stroke="#009B3A" stroke-width="2"/>
  <!-- Gola -->
  <path d="M80,60 Q100,50 120,60 Q110,75 100,75 Q90,75 80,60 Z" fill="#009B3A"/>
  <!-- Faixa verde no peito -->
  <path d="M15,110 L185,110 L185,130 L15,130 Z" fill="#009B3A" opacity="0.15"/>
  <!-- Losango CBF -->
  <polygon points="100,85 120,100 100,115 80,100" fill="#009B3A" opacity="0.8"/>
  <polygon points="100,88 117,100 100,112 83,100" fill="#FFCC00"/>
  <!-- Texto CBF -->
  <text x="100" y="104" text-anchor="middle" font-size="8" font-weight="bold" fill="#009B3A" font-family="Arial">CBF</text>
  <!-- Detalhes manga - faixa verde -->
  <path d="M10,70 L40,65 L40,72 L10,77 Z" fill="#009B3A" opacity="0.5"/>
  <path d="M190,70 L160,65 L160,72 L190,77 Z" fill="#009B3A" opacity="0.5"/>
  <!-- Número -->
  <text x="100" y="155" text-anchor="middle" font-size="28" font-weight="bold" fill="#009B3A" font-family="Arial" opacity="0.6">10</text>
</svg>
