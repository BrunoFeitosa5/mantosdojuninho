<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <clipPath id="flaBody">
      <path d="M 70,48 C 52,44 32,50 18,62 L 4,72 L 0,108 L 20,114 L 26,135 L 24,228 L 176,228 L 174,135 L 180,114 L 200,108 L 196,72 L 182,62 C 168,50 148,44 130,48 Q 120,34 100,32 Q 80,34 70,48 Z"/>
    </clipPath>
    <linearGradient id="flaShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="0.15" stop-color="rgba(0,0,0,0)"/>
      <stop offset="0.85" stop-color="rgba(0,0,0,0)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
  </defs>

  <!-- Red base -->
  <rect x="0" y="0" width="200" height="240" fill="#CC0000" clip-path="url(#flaBody)"/>

  <!-- Black horizontal stripes -->
  <rect x="0" y="74"  width="200" height="26" fill="#111111" clip-path="url(#flaBody)"/>
  <rect x="0" y="126" width="200" height="26" fill="#111111" clip-path="url(#flaBody)"/>
  <rect x="0" y="178" width="200" height="26" fill="#111111" clip-path="url(#flaBody)"/>

  <!-- Side shading for 3D effect -->
  <rect x="0" y="0" width="200" height="240" fill="url(#flaShade)" clip-path="url(#flaBody)"/>

  <!-- Jersey outline -->
  <path d="M 70,48 C 52,44 32,50 18,62 L 4,72 L 0,108 L 20,114 L 26,135 L 24,228 L 176,228 L 174,135 L 180,114 L 200,108 L 196,72 L 182,62 C 168,50 148,44 130,48 Q 120,34 100,32 Q 80,34 70,48 Z"
        fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="2"/>

  <!-- Sleeve hem lines -->
  <line x1="4" y1="105" x2="20" y2="111" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <line x1="200" y1="105" x2="180" y2="111" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>

  <!-- Bottom hem -->
  <line x1="24" y1="224" x2="176" y2="224" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>

  <!-- V-neck collar (black) -->
  <path d="M 70,48 Q 80,34 100,32 Q 120,34 130,48 L 116,66 Q 100,80 84,66 Z" fill="#111111"/>
  <!-- Collar red trim line -->
  <path d="M 72,50 Q 80,36 100,34 Q 120,36 128,50" fill="none" stroke="#CC0000" stroke-width="1.5"/>

  <!-- Badge -->
  <circle cx="100" cy="104" r="19" fill="white" opacity="0.95"/>
  <circle cx="100" cy="104" r="16" fill="#CC0000"/>
  <circle cx="100" cy="104" r="12" fill="#111111"/>
  <text x="100" y="109" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="Arial, sans-serif" letter-spacing="0.5">FLA</text>

  <!-- Sponsor area -->
  <rect x="72" y="128" width="56" height="13" rx="2" fill="rgba(255,255,255,0.08)"/>
  <text x="100" y="139" text-anchor="middle" font-size="6.5" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-weight="bold" letter-spacing="0.8">PATROCINADOR</text>

  <!-- Number -->
  <text x="100" y="203" text-anchor="middle" font-size="50" font-weight="bold" fill="rgba(255,255,255,0.15)" font-family="Impact, Arial, sans-serif">10</text>
</svg>
