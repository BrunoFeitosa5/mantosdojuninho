<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <clipPath id="cruBody">
      <path d="M 70,48 C 52,44 32,50 18,62 L 4,72 L 0,108 L 20,114 L 26,135 L 24,228 L 176,228 L 174,135 L 180,114 L 200,108 L 196,72 L 182,62 C 168,50 148,44 130,48 Q 120,34 100,32 Q 80,34 70,48 Z"/>
    </clipPath>
    <linearGradient id="cruGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#003DA5"/>
      <stop offset="1" stop-color="#001E6E"/>
    </linearGradient>
    <linearGradient id="cruShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(0,0,0,0.22)"/>
      <stop offset="0.18" stop-color="rgba(0,0,0,0)"/>
      <stop offset="0.82" stop-color="rgba(0,0,0,0)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.22)"/>
    </linearGradient>
  </defs>

  <!-- Navy blue base -->
  <rect x="0" y="0" width="200" height="240" fill="url(#cruGrad)" clip-path="url(#cruBody)"/>

  <!-- Subtle white side trim panels -->
  <path d="M 26,135 L 24,228 L 40,228 L 42,135 Z" fill="white" opacity="0.08" clip-path="url(#cruBody)"/>
  <path d="M 174,135 L 176,228 L 160,228 L 158,135 Z" fill="white" opacity="0.08" clip-path="url(#cruBody)"/>

  <!-- Side shading for depth -->
  <rect x="0" y="0" width="200" height="240" fill="url(#cruShade)" clip-path="url(#cruBody)"/>

  <!-- Jersey outline -->
  <path d="M 70,48 C 52,44 32,50 18,62 L 4,72 L 0,108 L 20,114 L 26,135 L 24,228 L 176,228 L 174,135 L 180,114 L 200,108 L 196,72 L 182,62 C 168,50 148,44 130,48 Q 120,34 100,32 Q 80,34 70,48 Z"
        fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="2"/>

  <!-- Sleeve hem lines -->
  <line x1="4" y1="105" x2="20" y2="111" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <line x1="200" y1="105" x2="180" y2="111" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- Bottom hem -->
  <line x1="24" y1="224" x2="176" y2="224" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Round collar (navy with white trim) -->
  <path d="M 74,50 Q 80,36 100,34 Q 120,36 126,50 L 120,58 Q 100,68 80,58 Z" fill="#002070"/>
  <path d="M 74,50 Q 80,36 100,34 Q 120,36 126,50" fill="none" stroke="white" stroke-width="2.5"/>
  <path d="M 80,58 Q 100,68 120,58" fill="none" stroke="white" stroke-width="1.2"/>

  <!-- White sleeve stripes -->
  <path d="M 4,75 L 20,72 L 20,76 L 4,79 Z" fill="white" opacity="0.5"/>
  <path d="M 4,82 L 20,79 L 20,83 L 4,86 Z" fill="white" opacity="0.5"/>
  <path d="M 196,75 L 180,72 L 180,76 L 196,79 Z" fill="white" opacity="0.5"/>
  <path d="M 196,82 L 180,79 L 180,83 L 196,86 Z" fill="white" opacity="0.5"/>

  <!-- Southern Cross constellation stars -->
  <!-- Alpha Crucis (largest) -->
  <polygon points="100,82 101.8,87.5 107.5,87.5 103,91 104.8,96.5 100,93 95.2,96.5 97,91 92.5,87.5 98.2,87.5" fill="white" opacity="0.95"/>
  <!-- Beta Crucis -->
  <polygon points="114,92 115.2,95.7 119,95.7 116.1,97.9 117.3,101.6 114,99.4 110.7,101.6 111.9,97.9 109,95.7 112.8,95.7" fill="white" opacity="0.88"/>
  <!-- Gamma Crucis -->
  <polygon points="88,97 89.1,100.2 92.4,100.2 89.8,102.1 90.9,105.3 88,103.4 85.1,105.3 86.2,102.1 83.6,100.2 86.9,100.2" fill="white" opacity="0.88"/>
  <!-- Delta Crucis -->
  <polygon points="107,102 107.8,104.4 110.3,104.4 108.3,105.9 109.1,108.3 107,106.8 104.9,108.3 105.7,105.9 103.7,104.4 106.2,104.4" fill="white" opacity="0.82"/>
  <!-- Epsilon Crucis (smallest) -->
  <polygon points="94,106 94.7,108.1 96.9,108.1 95.1,109.5 95.8,111.6 94,110.2 92.2,111.6 92.9,109.5 91.1,108.1 93.3,108.1" fill="white" opacity="0.78"/>

  <!-- Badge -->
  <circle cx="100" cy="118" r="17" fill="white" opacity="0.93"/>
  <circle cx="100" cy="118" r="14" fill="#003DA5"/>
  <!-- Cross of Cruzeiro inside badge -->
  <rect x="98" y="108" width="4" height="20" fill="white" opacity="0.9"/>
  <rect x="90" y="116" width="20" height="4" fill="white" opacity="0.9"/>
  <text x="100" y="130" text-anchor="middle" font-size="5" font-weight="bold" fill="white" font-family="Arial, sans-serif" letter-spacing="0.5">CEC</text>

  <!-- Sponsor -->
  <rect x="72" y="142" width="56" height="13" rx="2" fill="rgba(255,255,255,0.06)"/>
  <text x="100" y="153" text-anchor="middle" font-size="6.5" fill="rgba(255,255,255,0.35)" font-family="Arial, sans-serif" font-weight="bold" letter-spacing="0.8">PATROCINADOR</text>

  <!-- Number -->
  <text x="100" y="210" text-anchor="middle" font-size="50" font-weight="bold" fill="rgba(255,255,255,0.12)" font-family="Impact, Arial, sans-serif">10</text>
</svg>
