<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <clipPath id="barcaBody">
      <path d="M 70,48 C 52,44 32,50 18,62 L 4,72 L 0,108 L 20,114 L 26,135 L 24,228 L 176,228 L 174,135 L 180,114 L 200,108 L 196,72 L 182,62 C 168,50 148,44 130,48 Q 120,34 100,32 Q 80,34 70,48 Z"/>
    </clipPath>
    <linearGradient id="barcaShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(0,0,0,0.2)"/>
      <stop offset="0.12" stop-color="rgba(0,0,0,0)"/>
      <stop offset="0.88" stop-color="rgba(0,0,0,0)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.2)"/>
    </linearGradient>
  </defs>

  <!-- Vertical stripes: alternating Blue (#004FC3) and Red (#C8102E) -->
  <!-- Each stripe ~22px wide, starting from left -->
  <rect x="0"   y="0" width="200" height="240" fill="#C8102E" clip-path="url(#barcaBody)"/>
  <rect x="0"   y="0" width="22"  height="240" fill="#004FC3" clip-path="url(#barcaBody)"/>
  <rect x="44"  y="0" width="22"  height="240" fill="#004FC3" clip-path="url(#barcaBody)"/>
  <rect x="88"  y="0" width="22"  height="240" fill="#004FC3" clip-path="url(#barcaBody)"/>
  <rect x="132" y="0" width="22"  height="240" fill="#004FC3" clip-path="url(#barcaBody)"/>
  <rect x="176" y="0" width="24"  height="240" fill="#004FC3" clip-path="url(#barcaBody)"/>

  <!-- Side shading for depth -->
  <rect x="0" y="0" width="200" height="240" fill="url(#barcaShade)" clip-path="url(#barcaBody)"/>

  <!-- Jersey outline -->
  <path d="M 70,48 C 52,44 32,50 18,62 L 4,72 L 0,108 L 20,114 L 26,135 L 24,228 L 176,228 L 174,135 L 180,114 L 200,108 L 196,72 L 182,62 C 168,50 148,44 130,48 Q 120,34 100,32 Q 80,34 70,48 Z"
        fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="2"/>

  <!-- Sleeve hem lines -->
  <line x1="4" y1="105" x2="20" y2="111" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <line x1="200" y1="105" x2="180" y2="111" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>

  <!-- Bottom hem -->
  <line x1="24" y1="224" x2="176" y2="224" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>

  <!-- Yellow/gold sleeve trim -->
  <path d="M 4,79 L 20,77 L 20,81 L 4,83 Z" fill="#EDBB00" opacity="0.9"/>
  <path d="M 196,79 L 180,77 L 180,81 L 196,83 Z" fill="#EDBB00" opacity="0.9"/>

  <!-- Round collar (dark blue with gold trim) -->
  <path d="M 74,50 Q 80,36 100,34 Q 120,36 126,50 L 120,58 Q 100,68 80,58 Z" fill="#003087"/>
  <path d="M 74,50 Q 80,36 100,34 Q 120,36 126,50" fill="none" stroke="#EDBB00" stroke-width="2.5"/>
  <path d="M 80,58 Q 100,68 120,58" fill="none" stroke="#EDBB00" stroke-width="1.2"/>

  <!-- Badge background -->
  <rect x="83" y="87" width="34" height="32" rx="5" fill="white" opacity="0.95"/>
  <!-- Cross of Sant Jordi (red) -->
  <rect x="98.5" y="88" width="5" height="30" fill="#C8102E"/>
  <rect x="84" y="99" width="32" height="5" fill="#C8102E"/>
  <!-- Yellow stripes area (simplified Catalan flag) -->
  <rect x="99" y="104" width="4.5" height="13" fill="#EDBB00" opacity="0.8"/>
  <!-- FCB text -->
  <text x="100" y="112" text-anchor="middle" font-size="7" font-weight="bold" fill="#004FC3" font-family="Arial, sans-serif">FCB</text>

  <!-- Sponsor -->
  <rect x="72" y="128" width="56" height="13" rx="2" fill="rgba(255,255,255,0.1)"/>
  <text x="100" y="139" text-anchor="middle" font-size="6.5" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif" font-weight="bold" letter-spacing="0.8">PATROCINADOR</text>

  <!-- Number -->
  <text x="100" y="203" text-anchor="middle" font-size="50" font-weight="bold" fill="rgba(255,255,255,0.18)" font-family="Impact, Arial, sans-serif">10</text>
</svg>
